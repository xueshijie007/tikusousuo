﻿<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>科目一科目二搜题站</title>
    <link rel="stylesheet" href="./styles.css?v=20260306-search" />
  </head>
  <body>
    <main class="page">
      <header class="hero card">
        <h1>科目一科目二搜题站</h1>
        <p>输入关键词即可快速查题，支持按科目和题型筛选。</p>
      </header>

      <section class="panel card">
        <div class="actions">
          <button id="searchBtn" class="btn">搜索</button>
          <button id="resetBtn" class="btn secondary">重置</button>
        </div>

        <label class="field field-query">
          <span>关键词</span>
          <input
            id="queryInput"
            type="search"
            placeholder="例如：教师职业道德 / 题号 120 / 关键短语"
          />
        </label>

        <label class="field">
          <span>科目</span>
          <select id="subjectSelect">
            <option value="全部">全部</option>
            <option value="科目一">科目一</option>
            <option value="科目二">科目二</option>
          </select>
        </label>

        <label class="field">
          <span>题型</span>
          <select id="qtypeSelect">
            <option value="全部">全部</option>
            <option value="单选题">单选题</option>
            <option value="多选题">多选题</option>
            <option value="判断题">判断题</option>
            <option value="填空题">填空题</option>
          </select>
        </label>

        <label class="field">
          <span>每页条数</span>
          <select id="pageSizeSelect">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
          </select>
        </label>
      </section>

      <section id="summary" class="summary card">正在加载题库...</section>

      <section id="resultList" class="result-list"></section>

      <section id="pagination" class="pagination card hidden">
        <button id="prevBtn" class="btn secondary">上一页</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" class="btn secondary">下一页</button>
      </section>
    </main>

    <script src="./app.js?v=20260314-loadfix"></script>
  </body>
</html>
